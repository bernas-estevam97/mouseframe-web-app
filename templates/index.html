<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="shortcut icon" href="{% static 'img/mus-musculus.ico' %}">
    <title>Image Analysis</title>
</head>
<body>
    <header>
        <h1>Image Analysis - Mus Musculus walking behaviour</h1>
        <img src="{% static 'img/mouse.png' %}">
    </header>
    <div class="img-selection">
    <div class="requirements">
        <h3>Requirements</h3>
        <ol>
            <li>***</li>
            <li>***</li>
            <li>***</li>
            <li>***</li>
        </ol>
    </div>
    <div class="img-upload">
    <form action="">
        <label for="img">Upload your image here:</label>
        <input type="file" id="image" name="image" alt="Upload" accept="image/*" onchange="loadFile(event)" style="display: none;">
        <input class="upload-btn" type="button" value="Select Image" onclick="document.getElementById('image').click();" />
      </form>
    <div id="imgContainer" class="image-container">
      <canvas id="canvas"></canvas>
    </div>
    </div>
    </div>
    <div class="bottom-functions">
      <div class="buttons">
         <button id="redCircle" onclick="drawRedCircle();">Add button - Red</button>
         <button id="blueCircle" onclick="drawBlueCircle();">Add button - Blue</button>
         <button id="deleteCircle" onclick="removeRedCircle();">Delete last added Red dot</button>
         <button id="deleteCircle" onclick="removeBlueCircle();">Delete last added Blue dot</button>
         <button id="reset" onclick="clearCanvas();">Reset Canvas</button>
         <button id="reset" onclick="resetFile();">Reset Image</button>
       </div>
    <div class="data-results" id="showData">
        <h3>Data retrieved:</h3>
        <ul>
            <li>Stride length hind legs: {}</li>
            <li>Stride length front legs: {}</li>
            <li>Overlap: {}</li>
            <li>Stride width: {}</li>
        </ul>
    </div>
    
   </div>
<script type="text/javascript" src="{% static 'js/jquery-3.6.0.min.js' %}"></script>
<script type="text/javascript" src="{% static 'js/canvas_testing.js' %}"></script>
<script>
   let imgContainer = document.getElementById("imgContainer");
    let loadFile = function(event){
        imgContainer.style.backgroundImage = "url(" +URL.createObjectURL(event.target.files[0])+ ")"
    }
    let resetFile = function(event){
      imgContainer.style.backgroundImage = ""
    }
</script>
</body>
</html>
