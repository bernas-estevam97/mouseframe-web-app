<!DOCTYPE html>
{% load static %}
{% load csp %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <link rel="stylesheet" href="{% static 'css/login.css' %}">
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
    <script type="text/javascript" src="{% static 'js/bootstrap.min.js' %}"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="{% static 'img/mus-musculus.ico' %}">
    <title>MouseFrame - 500</title>
</head>
<body>
    {% block content %}
    <section class="vh-100 gradient-custom">
        
        <div class="container py-5 h-100">
          <style nonce="{{ request.csp_nonce }}">
            .card bg-dark text-white{border-radius: 1rem;}
            .form-outline img{height: 200px; width: 200px;}
        </style>
          <div class="row d-flex justify-content-center align-items-center h-100">
            <div class="col-12 col-md-8 col-lg-6 col-xl-5">
              <div class="card bg-dark text-white">
                <div class="card-body p-5 text-center">
      
                  <div class="mb-md-5 mt-md-4">
                   

                    <h2 class="fw-bold mb-2 text-uppercase">MouseFrame - 500</h2>
                    
                    <p class="text-white-50 mb-5">Internal server error</p>
                    
                    <div class="form-outline form-white mb-4">
                    <img src="{% static 'img/server-down.png' %}">
                    </div>
                    <p class="text-white-50 mb-5">Contact the admin, with the previously provided details, for more information.</p>
                  </div>
      
                </div>
              </div>
            </div>
          </div>
        </div>
        
      </section>
      {% endblock %}

</body>
