<!DOCTYPE html>
{% load static %}
{% load csp %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="shortcut icon" href="{% static 'img/mus-musculus.ico' %}">
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
    <link rel="stylesheet" href="{% static 'css/login.css' %}">
    
    <!-- This allows child pages to override the title -->
    <title>{% block title %}MouseFrame{% endblock %}</title>
</head>
<body>

    <!-- This is the placeholder where your other templates will inject their code -->
    {% block content %}
    {% endblock %}

    <script type="text/javascript" src="{% static 'js/jquery-3.7.1.min.js' %}"></script>
    <script type="text/javascript" src="{% static 'js/bootstrap.bundle.min.js' %}"></script>
</body>
</html>
