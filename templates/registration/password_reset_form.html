{% extends 'base.html' %}

{% block content %}
<section class="vh-100 gradient-custom">
  <div class="container py-5 h-100">
    <div class="row d-flex justify-content-center align-items-center h-100">
      <div class="col-12 col-md-8 col-lg-6 col-xl-5">
        <div class="card bg-dark text-white" style="border-radius: 1rem;">
          <div class="card-body p-5 text-center">

            <div class="mb-md-5 mt-md-4">
              <h3 class="fw-bold mb-2 text-uppercase">Reset Password</h3>
              <p class="text-white-50 mb-5">Enter your email address and we'll send you a link to reset your password.</p>

              <form method="POST" action="{% url 'password_reset' %}">
                {% csrf_token %}

                {% if form.errors %}
                  <div class="alert alert-danger" role="alert">
                    Please correct the error below.
                  </div>
                {% endif %}

                <div class="form-outline form-white mb-4 text-start">
                  <label class="form-label" for="{{ form.email.id_for_label }}">Email Address</label>
                  <input type="email" name="{{ form.email.name }}" id="{{ form.email.id_for_label }}" class="form-control form-control-lg" required>
                </div>

                <button class="btn btn-outline-info px-5 mt-3" type="submit">Send Email</button>
              </form>

            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
