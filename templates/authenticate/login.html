<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <link rel="stylesheet" href="{% static 'css/login.css' %}">
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="{% static 'img/mus-musculus.ico' %}">
    <title>Mouse Frame - Auth</title>
</head>
<body>
  {% block content %}
    <section class="vh-100 gradient-custom">
        
        <div class="container py-5 h-100">
          <div class="row d-flex justify-content-center align-items-center h-100">
            <div class="col-12 col-md-8 col-lg-6 col-xl-5">
              <div class="card bg-dark text-white" style="border-radius: 1rem;">
                <div class="card-body p-5 text-center">
      
                  <div class="mb-md-5 mt-md-4">
                    <form action="" method="POST">
                    {% csrf_token %}

                    <h2 class="fw-bold mb-2 text-uppercase">APP Login</h2>
                    <p class="text-white-50 mb-5">Please enter your given login credentials</p>
                    <div class="form-outline form-white mb-4">
                      <input type="user" id="username" class="form-control form-control-lg" name="username" required/>
                      <label class="form-label" for="username">User</label>
                    </div>
      
                    <div class="form-outline form-white mb-4">
                      <input type="password" id="password" class="form-control form-control-lg" name="password" required/>
                      <label class="form-label" for="password">Password</label>
                    </div>
      
                    <button class="btn btn-outline-info px-5" data-mdb-ripple-color="dark" type="submit">Login</button><br><br>
                    {% if messages %}
                      {% for message in messages %}
                      <div class="alert alert-warning alert-dismissible fade show" role="alert">
                        {{message}}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                      </div>
                      {% endfor %}
                    <p style="margin-top: 10px; color: red;">{{error}}</p>
                    {% endif %}
                    </form>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
        
      </section>
      {% endblock %}

      <script type="text/javascript" src="{% static 'js/jquery-3.7.1.min.js' %}"></script>
      <script type="text/javascript" src="{% static 'js/bootstrap.bundle.min.js' %}"></script>
</body>
</html>
